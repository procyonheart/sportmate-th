<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" fill="none">
  <defs>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6B35"/>
      <stop offset="1" stop-color="#CC2200"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon badge -->
  <path d="M10 50 L28 10 L62 10 L80 50 L62 90 L28 90 Z" fill="url(#badgeGrad)"/>
  <polygon points="58,16 34,52 50,52 26,84 60,48 44,48" fill="white" filter="url(#glow)"/>

  <!-- Wordmark: single text flow -->
  <text x="98" y="72"
    font-family="'Kanit', 'Arial Black', sans-serif"
    font-size="58"
    font-weight="900"
    font-style="italic"
    letter-spacing="-2">
    <tspan fill="#F5F5F5">SPORT</tspan><tspan fill="#FF4D1C">MATE</tspan>
  </text>

  <!-- TH badge -->
  <rect x="418" y="18" width="44" height="28" rx="5" fill="#FF4D1C"/>
  <text x="427" y="37"
    font-family="'Kanit', 'Arial Black', sans-serif"
    font-size="15"
    font-weight="900"
    letter-spacing="1"
    fill="white">TH</text>
</svg>
